name: PyWorkflow Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Dependencies
      run: |
        pip install -r requirements.txt
        pip install .[all]

    - name: Run Linting
      run: |
        pip install flake8
        flake8 pyworkflow/

    - name: Run Type Checking
      run: |
        pip install mypy
        mypy pyworkflow/

    - name: Install Graphviz
      run: |
        sudo apt-get update
        sudo apt-get install -y graphviz

    - name: Run Tests
      run: |
        python3 -m pytest --cov=pyworkflow

    - name: Build Package
      run: |
        pip install build
        python3 -m build

